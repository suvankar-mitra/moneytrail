<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoneyTrail ERD</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 24px;
      background: #fff;
      color: #3d3d3a;
    }
    h2 {
      font-size: 18px;
      font-weight: 500;
      margin: 0 0 4px;
    }
    p {
      font-size: 13px;
      color: #73726c;
      margin: 0 0 20px;
    }
    #erd svg { width: 100%; height: auto; }
    @media (prefers-color-scheme: dark) {
      body { background: #1a1a18; color: #c2c0b6; }
    }
  </style>
</head>
<body>
  <h2>MoneyTrail — Database Schema (ERD)</h2>
  <p>v0.0.1 · 6 tables · Double-entry bookkeeping model</p>
  <div id="erd"></div>
  <script type="module">
    import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
    const dark = matchMedia('(prefers-color-scheme: dark)').matches;
    await document.fonts.ready;
    mermaid.initialize({
      startOnLoad: false,
      theme: 'base',
      fontFamily: 'sans-serif',
      themeVariables: {
        darkMode: dark,
        fontSize: '13px',
        fontFamily: 'sans-serif',
        lineColor: dark ? '#9c9a92' : '#73726c',
        textColor: dark ? '#c2c0b6' : '#3d3d3a',
        primaryColor: dark ? '#2C2C2A' : '#F1EFE8',
        primaryBorderColor: dark ? '#444441' : '#B4B2A9',
        attributeBackgroundColorEven: dark ? '#26211a' : '#FAEEDA',
        attributeBackgroundColorOdd: dark ? '#2c2822' : '#fff9f0',
      },
    });

    const diagram = `erDiagram
  USERS {
    UUID id PK
    VARCHAR name
    VARCHAR email
    TEXT password_hash
    TIMESTAMPTZ created_at
    TIMESTAMPTZ updated_at
  }
  CONTACTS {
    UUID id PK
    UUID user_id FK
    VARCHAR name
    VARCHAR email
    VARCHAR phone
    TEXT notes
    TIMESTAMPTZ created_at
    TIMESTAMPTZ updated_at
  }
  ACCOUNTS {
    UUID id PK
    UUID user_id FK
    UUID contact_id FK
    VARCHAR name
    VARCHAR type
    CHAR currency
    BOOLEAN is_virtual
    TIMESTAMPTZ created_at
    TIMESTAMPTZ updated_at
  }
  TRANSACTIONS {
    UUID id PK
    UUID from_account_id FK
    UUID to_account_id FK
    DECIMAL amount
    TIMESTAMPTZ tran_date
    TEXT note
    TIMESTAMPTZ created_at
    TIMESTAMPTZ updated_at
  }
  TAGS {
    BIGSERIAL id PK
    UUID user_id FK
    VARCHAR tag_name
  }
  TRANSACTION_TAGS {
    UUID transaction_id FK
    BIGINT tag_id FK
  }

  USERS ||--o{ CONTACTS : "owns"
  USERS ||--o{ ACCOUNTS : "owns"
  USERS ||--o{ TAGS : "owns"
  CONTACTS ||--o{ ACCOUNTS : "linked to"
  ACCOUNTS ||--o{ TRANSACTIONS : "from"
  ACCOUNTS ||--o{ TRANSACTIONS : "to"
  TRANSACTIONS ||--o{ TRANSACTION_TAGS : "tagged with"
  TAGS ||--o{ TRANSACTION_TAGS : "applied via"
`;

    const { svg } = await mermaid.render('erd-svg', diagram);
    document.getElementById('erd').innerHTML = svg;

    document.querySelectorAll('#erd svg .node').forEach(node => {
      const firstPath = node.querySelector('path[d]');
      if (!firstPath) return;
      const d = firstPath.getAttribute('d');
      const nums = d.match(/-?[\d.]+/g)?.map(Number);
      if (!nums || nums.length < 8) return;
      const xs = [nums[0], nums[2], nums[4], nums[6]];
      const ys = [nums[1], nums[3], nums[5], nums[7]];
      const x = Math.min(...xs), y = Math.min(...ys);
      const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
      const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      rect.setAttribute('x', x); rect.setAttribute('y', y);
      rect.setAttribute('width', w); rect.setAttribute('height', h);
      rect.setAttribute('rx', '8');
      for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
        if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
      }
      firstPath.replaceWith(rect);
    });

    document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
      p.setAttribute('stroke', 'none');
    });
  </script>
</body>
</html>
